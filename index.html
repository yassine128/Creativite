<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="5 façons d'améliorer sa créativité – IND8108 Yassine Seddaoui">
  <title>5 façons d'améliorer sa créativité</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F5F0;
      --bg2:      #EFECE5;
      --surface:  #FDFCF9;
      --border:   #D8D3C8;
      --text:     #1A1916;
      --dim:      #6B6660;
      --accent:   #1A1916;
      --ink:      #1A1916;
      --rule:     rgba(26,25,22,0.12);
      --shadow:   rgba(26,25,22,0.06);

      --c1: #C1440E;   /* terracotta */
      --c2: #1A6B5A;   /* forest */
      --c3: #8B6914;   /* ochre */
      --c4: #B04A1A;   /* sienna */
      --c5: #3D2D6B;   /* indigo */

      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', -apple-system, sans-serif;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Fine grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    .shell {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    header {
      padding: clamp(2rem,5vw,3.5rem) clamp(1.5rem,5vw,4rem) 0;
      position: relative;
    }

    .header-rule {
      display: flex; align-items: center; gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .header-rule::before, .header-rule::after {
      content: ''; flex: 1; height: 1px; background: var(--rule);
    }
    .header-eyebrow {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 1.25rem;
      max-width: 700px;
    }

    h1 em {
      font-style: italic;
      color: var(--c1);
    }

    .header-bottom {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
      gap: 2rem;
      flex-wrap: wrap;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--dim);
      font-weight: 300;
      max-width: 380px;
      line-height: 1.7;
    }

    .header-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 0.25rem;
      flex-shrink: 0;
    }
    .header-meta span {
      font-size: 0.75rem; color: var(--dim);
      font-weight: 400; letter-spacing: 0.04em;
    }
    .header-meta strong {
      font-family: var(--font-serif); font-weight: 400;
      font-size: 1rem; color: var(--text);
    }

    /* ═══════════════════════════════════════════
       MINDMAP (Desktop)
    ═══════════════════════════════════════════ */
    .mindmap-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem clamp(1rem,3vw,2rem) 1rem;
    }

    .mindmap-stage {
      position: relative;
      width: min(960px, 100%);
      aspect-ratio: 16/9;
    }

    #svg-branches {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      overflow: visible; pointer-events: none;
    }

    /* ── Center node ── */
    .center-node {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      opacity: 0;
      animation: fadeIn 0.8s var(--ease) 0.4s both;
    }

    .center-blob {
      width: clamp(110px,13vw,165px);
      height: clamp(110px,13vw,165px);
      background: var(--ink);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.3rem;
      box-shadow: 0 2px 24px rgba(26,25,22,0.18), 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    .center-label-sm {
      font-family: var(--font-sans);
      font-size: clamp(0.5rem, 0.8vw, 0.65rem);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .center-text {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      font-weight: 400;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      font-style: italic;
    }

    /* ═══════════════════════════════════════════
       BUBBLES
    ═══════════════════════════════════════════ */
    .bubble {
      position: absolute;
      width: clamp(110px,13vw,158px);
      transform: translate(-50%, -50%) scale(0);
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-start;
      cursor: pointer; z-index: 4;
      text-align: left; padding: 1rem 1rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      box-shadow: 0 1px 4px var(--shadow), 0 4px 16px var(--shadow);
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), border-color 0.25s;
      user-select: none;
    }

    .bubble.show {
      transform: translate(-50%, -50%) scale(1);
    }

    .bubble:hover, .bubble:focus-visible {
      transform: translate(-50%, -50%) scale(1.04) !important;
      box-shadow: 0 4px 8px var(--shadow), 0 12px 32px rgba(26,25,22,0.1);
      border-color: var(--color);
      z-index: 7;
    }
    .bubble:focus-visible { outline: 2px solid var(--color); outline-offset: 3px; }

    .bubble-num {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--color);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .bubble-icon {
      width: clamp(18px,2.2vw,24px);
      height: clamp(18px,2.2vw,24px);
      color: var(--color);
      margin-bottom: 0.5rem;
      opacity: 0.85;
    }
    .bubble-icon svg { width: 100%; height: 100%; }

    .bubble-label {
      font-family: var(--font-serif);
      font-size: clamp(0.75rem,1.1vw,0.95rem);
      font-weight: 400;
      line-height: 1.25;
      color: var(--text);
    }

    .bubble-sub {
      font-size: clamp(0.55rem, 0.75vw, 0.65rem);
      color: var(--dim);
      margin-top: 0.25rem;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* ═══════════════════════════════════════════
       MOBILE CARDS
    ═══════════════════════════════════════════ */
    .mobile-section { display: none; }

    .mobile-center-wrap {
      display: flex; justify-content: center;
      padding: 2rem 0 1.5rem;
    }

    .m-blob {
      width: 90px; height: 90px;
      background: var(--ink);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.2rem;
    }
    .m-blob-label { font-size: 0.5rem; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
    .m-blob-main { font-family: var(--font-serif); font-style: italic; color: #fff; font-size: 0.9rem; }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0 1.5rem 2rem;
      max-width: 520px;
      margin: 0 auto; width: 100%;
    }

    .m-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 1.25rem 1.25rem 1.25rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s;
      display: grid;
      grid-template-columns: 2rem 1fr auto;
      align-items: start; gap: 1rem;
      position: relative;
    }
    .m-card:first-child { border-radius: 3px 3px 0 0; }
    .m-card:last-child  { border-radius: 0 0 3px 3px; border-bottom: 1px solid var(--border); }

    .m-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--color); opacity: 0;
      transition: opacity 0.2s;
    }
    .m-card:hover::before { opacity: 1; }
    .m-card:hover { background: var(--bg2); }
    .m-card:focus-visible { outline: 2px solid var(--color); }

    .m-card-num {
      font-family: var(--font-sans);
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em;
      color: var(--color); padding-top: 0.15rem;
    }

    .m-card-icon { width: 20px; height: 20px; color: var(--text); opacity: 0.3; margin-top: 0.1rem; flex-shrink: 0; }
    .m-card-icon svg { width: 100%; height: 100%; }

    .m-card-content { }
    .m-card-title {
      font-family: var(--font-serif);
      font-size: 1.05rem; font-weight: 400; color: var(--text);
      margin-bottom: 0.3rem; line-height: 1.2;
    }
    .m-card-desc { font-size: 0.8rem; color: var(--dim); line-height: 1.5; font-weight: 300; }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(26,25,22,0.5);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0;
      max-width: 540px; width: 100%;
      position: relative;
      transform: translateY(16px); opacity: 0;
      transition: transform 0.35s var(--ease), opacity 0.35s;
      max-height: 90dvh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(26,25,22,0.2), 0 2px 8px rgba(26,25,22,0.1);
    }
    .modal-overlay.open .modal-box { transform: translateY(0); opacity: 1; }

    .modal-header-bar {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-color-stripe {
      width: 4px; background: var(--color); flex-shrink: 0;
      border-radius: 4px 0 0 0;
    }

    .modal-header-inner {
      flex: 1;
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem;
    }

    .modal-header-left { }

    .modal-tag {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--color);
      margin-bottom: 0.5rem; display: block;
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem,4vw,2rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }

    .modal-close {
      width: 32px; height: 32px; border-radius: 2px; flex-shrink: 0;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
      margin-top: 0.1rem;
    }
    .modal-close:hover { background: var(--text); color: var(--surface); border-color: var(--text); }
    .modal-close:focus-visible { outline: 2px solid var(--color); }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-subtitle {
      font-size: 0.8rem; color: var(--dim); font-weight: 300;
      letter-spacing: 0.05em; margin-bottom: 1.25rem;
    }

    .modal-short {
      color: var(--text);
      font-size: 0.975rem;
      line-height: 1.75;
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .modal-divider {
      height: 1px; background: var(--border);
      margin-bottom: 1.25rem;
    }

    .modal-detail-label {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--dim);
      margin-bottom: 0.6rem;
    }

    .modal-detail {
      font-size: 0.9rem; line-height: 1.75; color: var(--dim);
      margin-bottom: 1.25rem;
    }

    .modal-example {
      background: var(--bg2);
      border-left: 3px solid var(--color);
      padding: 0.85rem 1rem;
      border-radius: 0 2px 2px 0;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.6;
      font-weight: 300;
    }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    footer {
      position: relative; z-index: 2;
      padding: 1rem clamp(1.5rem,5vw,4rem);
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--rule);
      margin-top: auto;
      flex-wrap: wrap; gap: 0.5rem;
    }

    .footer-info {
      font-size: 0.75rem; color: var(--dim); font-weight: 400;
    }
    .footer-info strong { color: var(--text); font-weight: 500; }

    .footer-dots {
      display: flex; gap: 0.4rem; align-items: center;
    }
    .footer-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border);
    }

    /* ═══════════════════════════════════════════
       LOADING
    ═══════════════════════════════════════════ */
    #loading {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      transition: opacity 0.5s var(--ease), visibility 0.5s;
    }
    #loading.out { opacity: 0; visibility: hidden; }

    .load-bar-wrap {
      width: 120px; height: 1px;
      background: var(--border); position: relative; overflow: hidden;
    }
    .load-bar {
      position: absolute; left: -100%; top: 0; bottom: 0; width: 100%;
      background: var(--ink);
      animation: loadSlide 1s var(--ease) forwards;
    }
    .load-txt {
      font-family: var(--font-sans); font-size: 0.7rem;
      color: var(--dim); letter-spacing: 0.16em; text-transform: uppercase;
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════
       KEYFRAMES
    ═══════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity:0; transform: translate(-50%,-50%) scale(0.88); }
      to   { opacity:1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes loadSlide {
      from { left: -100%; }
      to   { left: 0; }
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 680px) {
      .mindmap-wrap   { display:none; }
      .mobile-section { display:block; }
    }
    @media (min-width: 681px) {
      .mobile-section { display:none; }
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--dim); }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading" role="status" aria-label="Chargement">
  <div class="load-txt">Chargement</div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
</div>

<!-- SHELL -->
<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="header-rule">
      <span class="header-eyebrow">IND8108 &mdash; Créativité</span>
    </div>
    <h1>5 façons d'améliorer<br>sa <em>créativité</em></h1>
    <div class="header-bottom">
      <div class="header-meta">
        <span>Yassine Seddaoui</span>
      </div>
    </div>
  </header>

  <!-- DESKTOP MINDMAP -->
  <div class="mindmap-wrap">
    <div class="mindmap-stage" id="stage">
      <svg id="svg-branches" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="center-node" id="centerNode">
        <div class="center-blob">
          <span class="center-label-sm">Thème central</span>
          <span class="center-text">Créativité</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MOBILE SECTION -->
  <div class="mobile-section">
    <div class="mobile-center-wrap">
      <div class="m-blob">
        <span class="m-blob-label">Thème</span>
        <span class="m-blob-main">Créativité</span>
      </div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-info">
      <strong>IND8108</strong> &mdash; Yassine Seddaoui
    </div>
    <div class="footer-dots">
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
      <div class="footer-dot"></div>
    </div>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="mTitle">
  <div class="modal-box" id="mBox">
    <div class="modal-header-bar">
      <div class="modal-color-stripe" id="mStripe"></div>
      <div class="modal-header-inner">
        <div class="modal-header-left">
          <span class="modal-tag" id="mTag"></span>
          <h2 class="modal-title" id="mTitle"></h2>
        </div>
        <button class="modal-close" id="mClose" onclick="closeModal()" aria-label="Fermer">&#x2715;</button>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-subtitle" id="mSub"></p>
      <p class="modal-short" id="mShort"></p>
      <div class="modal-divider"></div>
      <div class="modal-detail-label">Détail</div>
      <p class="modal-detail" id="mDetail"></p>
      <div class="modal-example" id="mExample" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const ICONS = {
  mindmap: `<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 10V26M18 18H28M18 18H8M10 8L14 12M26 8L22 12M10 28L14 24M26 28L22 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="18" cy="18" r="4" fill="currentColor" opacity="0.2"/>
    <circle cx="8" cy="18" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="28" cy="18" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="18" cy="8" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
    <circle cx="18" cy="28" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
  </svg>`,

  biomimicry: `<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M28 20C28 24 24 28 18 28C12 28 8 24 8 20C8 16 10 12 14 10C16 9 20 9 22 10C26 12 28 16 28 20Z" stroke="currentColor" stroke-width="2.2" fill="none"/>
    <path d="M14 10C14 8 16 6 18 6C20 6 22 8 22 10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M8 20C6 20 4 18 4 16C4 14 6 12 8 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M28 20C30 20 32 18 32 16C32 14 30 12 28 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <circle cx="18" cy="17" r="1.5" fill="currentColor"/>
    <path d="M16 22C16 22 17 24 18 24C19 24 20 22 20 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`,

  random: `<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="6" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.1"/>
    <rect x="20" y="6" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
    <rect x="6" y="20" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
    <rect x="20" y="20" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.1"/>
    <circle cx="11" cy="11" r="1.5" fill="currentColor"/>
    <circle cx="25" cy="25" r="1.5" fill="currentColor"/>
  </svg>`,

  constraints: `<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">

const DATA = [

    detail:"C'est une technique assez simple on part d'une idée centrale et on dessine des branches avec des sous-idées. En faisant ça, on voit des liens qu'on n'aurait pas trouvés en écrivant une liste normale.",
  },
  {
    id:2, iconKey:"biomimicry", color:"#1A6B5A",
    title:"Biomimétisme",
    subtitle:"S'inspirer du vivant",
    short:"On regarde ce que la nature a déjà inventé et on s'en inspire pour résoudre nos propres problèmes.",
    detail:"La nature a des millions d'années d'avance sur nous. Les plantes, les animaux, les insectes ont tous trouvé des solutions efficaces à des problèmes complexes. Au lieu de repartir de zéro, on peut observer ce qui marche déjà dans la nature et l'adapter à ce qu'on veut créer.",
    example:"Le velcro vient des crochets de la bardane. Le train japonais Shinkansen a été redessiné d'après le bec du martin-pêcheur pour réduire le bruit."
  },
  {

function buildMindMap() {
  const stage = document.getElementById('stage');
  const svg   = document.getElementById('svg-branches');
  stage.querySelectorAll('.bubble').forEach(e => e.remove());
  svg.querySelectorAll('*').forEach(e => e.remove());

  const W = stage.offsetWidth, H = stage.offsetHeight;
  const cx = W / 2, cy = H / 2;
  const R  = Math.min(W, H) * 0.38;

  DATA.forEach((m, i) => {
    const angle = ((i / DATA.length) * 360 - 90) * Math.PI / 180;
    const bx = cx + R * Math.cos(angle);
    const by = cy + R * Math.sin(angle);

    // Connector line (straight, clean)
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', cx); line.setAttribute('y1', cy);
    line.setAttribute('x2', bx); line.setAttribute('y2', by);
    line.style.cssText = `stroke:${m.color};stroke-width:1.5;opacity:0.25;transition:opacity 0.3s,stroke-width 0.3s;`;
    line.setAttribute('data-bid', m.id);
    line.setAttribute('class','branch');
    const pl = Math.sqrt((bx-cx)**2+(by-cy)**2);
    line.style.strokeDasharray = pl;
    line.style.strokeDashoffset = pl;
    line.style.transition = `stroke-dashoffset 0.9s ease ${0.4+i*0.1}s, opacity 0.3s, stroke-width 0.3s`;
    svg.appendChild(line);
    requestAnimationFrame(() => { line.style.strokeDashoffset = 0; });

    // bubble
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.tabIndex = 0;
    bub.setAttribute('role','button');
    bub.setAttribute('aria-label', m.title);
    bub.setAttribute('data-bid', m.id);
    bub.style.setProperty('--color', m.color);
    bub.style.left = `${bx}px`;
    bub.style.top  = `${by}px`;
    bub.style.transition = `transform 0.4s cubic-bezier(0.34,1.56,0.64,1) ${0.6+i*0.12}s, box-shadow 0.25s, border-color 0.25s`;

    const numEl = document.createElement('div');
    numEl.className = 'bubble-num';
    numEl.textContent = `0${m.id}`;

    const ico = document.createElement('div');
    ico.className = 'bubble-icon';
    ico.style.color = m.color;
    ico.innerHTML = ICONS[m.iconKey] || '';

    const lbl = document.createElement('div');
    lbl.className = 'bubble-label';
    lbl.textContent = m.title;

    const sub = document.createElement('div');
    sub.className = 'bubble-sub';
    sub.textContent = m.subtitle;

    bub.append(numEl, ico, lbl, sub);
    bub.addEventListener('click',     () => openModal(m));
    bub.addEventListener('keydown',   e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openModal(m); }});
    bub.addEventListener('mouseenter',() => hlBranch(m.id, true));
    bub.addEventListener('mouseleave',() => hlBranch(m.id, false));
    stage.appendChild(bub);

    setTimeout(() => { bub.classList.add('show'); }, 100);
  });
}

function hlBranch(id, on) {
  const p = document.querySelector(`[data-bid="${id}"].branch`);
  if (!p) return;
  p.style.opacity     = on ? '0.7' : '0.25';
  p.style.strokeWidth = on ? '2.5' : '1.5';
}

function buildCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  DATA.forEach(m => {
    const c = document.createElement('div');
    c.className = 'm-card';
    c.tabIndex = 0;
    c.setAttribute('role','button');
    c.style.setProperty('--color', m.color);

    const num = document.createElement('div');
    num.className = 'm-card-num';
    num.textContent = `0${m.id}`;

    const content = document.createElement('div');
    content.className = 'm-card-content';
    const ttl = document.createElement('div');
    ttl.className = 'm-card-title';
    ttl.textContent = m.title;
    const desc = document.createElement('div');
    desc.className = 'm-card-desc';
    desc.textContent = m.short;
    content.append(ttl, desc);

    const ico = document.createElement('div');
    ico.className = 'm-card-icon';
    ico.innerHTML = ICONS[m.iconKey] || '';

    c.append(num, content, ico);
    c.addEventListener('click',   () => openModal(m));
    c.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openModal(m); }});
    grid.appendChild(c);
  });
}

function openModal(m) {
  document.getElementById('mStripe').style.background = m.color;
  document.getElementById('mTag').style.color  = m.color;
  document.getElementById('mTag').textContent  = `Méthode ${m.id} / ${DATA.length}`;
  document.getElementById('mTitle').textContent = m.title;
  document.getElementById('mSub').textContent   = m.subtitle;
  document.getElementById('mShort').textContent = m.short;
  document.getElementById('mDetail').textContent = m.detail;

  const exEl = document.getElementById('mExample');
  if (m.example) {
    exEl.textContent = m.example;
    exEl.style.display = 'block';
    exEl.style.setProperty('--color', m.color);
  } else {
    exEl.style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('mClose').focus(), 80);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

window.addEventListener('DOMContentLoaded', () => {
  buildCards();
  setTimeout(() => {
    buildMindMap();
    let rt;
    window.addEventListener('resize', () => {
      clearTimeout(rt);
      rt = setTimeout(buildMindMap, 200);
    });
  }, 100);

  setTimeout(() => {
    document.getElementById('loading').classList.add('out');
  }, 1100);
});
</script>
